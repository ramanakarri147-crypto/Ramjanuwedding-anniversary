<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Anniversary Grand Finale - Magical Neon Edition</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a001a;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            cursor: pointer;
            transition: background 2s;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .side-banner {
            position: absolute;
            width: 200px;
            height: 85vh;
            border: 4px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 10px #fff, 0 0 30px #ffd700, 0 0 70px #ffd700;
            z-index: 999;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            animation: neonShift 3s infinite alternate;
        }
        
        #left-banner { left: 40px; animation: slideLeft 1.2s ease-out forwards, neonShift 3s infinite alternate; }
        #right-banner { right: 40px; animation: slideRight 1.2s ease-out forwards, neonShift 3s infinite alternate; }

        @keyframes slideLeft { from { left: -400px; opacity: 0; } to { left: 40px; opacity: 1; } }
        @keyframes slideRight { from { right: -400px; opacity: 0; } to { right: 40px; opacity: 1; } }

        @keyframes neonShift {
            0% { border-color: #fff; box-shadow: 0 0 10px #fff, 0 0 30px #ffd700; }
            50% { border-color: #ffd700; box-shadow: 0 0 15px #ffd700, 0 0 40px #ff00de; }
            100% { border-color: #fff; box-shadow: 0 0 10px #fff, 0 0 30px #ffd700; }
        }

        .side-banner img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        .master-wrap { position: relative; width: 240px; height: 240px; z-index: 100; }
        .master-circle {
            width: 220px; height: 220px; border-radius: 50%; 
            border: 6px solid #fff;
            box-shadow: 0 0 20px #fff, 0 0 40px #ffd700;
            overflow: hidden;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: pulse 3s infinite alternate;
        }
        .master-circle img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        #couple-names {
            display: none;
            position: absolute;
            top: 75%; 
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff; 
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 20px #ff00de, 0 0 30px #ffd700;
            z-index: 1000;
        }

        #special-msg {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: #ffd700;
            font-size: 20px;
            display: none;
            z-index: 2000;
            text-shadow: 0 0 15px #ff00de;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }

        .orbit { position: absolute; border-radius: 50%; border: 1px dashed rgba(255, 215, 0, 0.15); display: none; }
        #inner-orbit { width: 380px; height: 380px; animation: rotate_cw 10s linear infinite; }
        #outer-orbit { width: 540px; height: 540px; animation: rotate_ccw 12s linear infinite; }

        .chaser { position: absolute; width: 80px; height: 80px; }
        .photo-inner { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; overflow: hidden; }
        .photo-inner img { width: 100%; height: 100%; object-fit: cover; }

        #letters-container {
            position: absolute; bottom: 60px; display: flex; flex-direction: row;
            justify-content: center; align-items: center; width: 100%; gap: 4px; z-index: 2000;
        }
        .letter-final {
            width: 42px; height: 42px; background-size: cover; border: 2px solid white;
            border-radius: 8px; color: white; display: flex; justify-content: center;
            align-items: center; font-size: 22px; font-weight: bold;
        }

        @keyframes rotate_cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate_ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .magic-particle {
            position: absolute;
            width: 15px; height: 15px;
            pointer-events: none;
            animation: magicFade 1.5s linear forwards;
            z-index: 5000;
        }
        @keyframes magicFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.2) translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body onclick="handleMagic()" onmousemove="createMagicParticle(event)" ontouchmove="createMagicParticle(event)">

<div id="special-msg">Forever Together with my lovely wife <b>Janu</b> ❤️</div>

<div class="main-container">
    <div class="side-banner" id="left-banner">
        <img src="jpg (10).JPG" onerror="this.src='jpg (10).jpg'">
    </div>
    <div class="side-banner" id="right-banner">
        <img src="jpg (1).JPG" onerror="this.src='jpg (1).jpg'">
    </div>

    <div class="orbit" id="inner-orbit">
        <div class="chaser" style="top:-40px; left:50%; transform:translateX(-50%);">
            <div class="photo-inner"><img src="jpg (5).JPG" onerror="this.src='jpg (5).jpg'"></div>
        </div>
        <div class="chaser" style="bottom:-40px; left:50%; transform:translateX(-50%);">
            <div class="photo-inner"><img src="jpg (2).JPG" onerror="this.src='jpg (2).jpg'"></div>
        </div>
    </div>

    <div class="orbit" id="outer-orbit">
        <div class="chaser" style="top:-40px; left:50%; transform:translateX(-50%);">
            <div class="photo-inner"><img src="jpg (7).JPG" onerror="this.src='jpg (7).jpg'"></div>
        </div>
        <div class="chaser" style="bottom:-40px; left:50%; transform:translateX(-50%);">
            <div class="photo-inner"><img src="jpg (8).JPG" onerror="this.src='jpg (8).jpg'"></div>
        </div>
    </div>

    <div class="master-wrap">
        <div class="master-circle">
            <img src="master.jpg.JPG" onerror="this.src='master.jpg'">
            <div id="couple-names">Ramana & Janu</div>
        </div>
    </div>

    <div id="letters-container"></div>
</div>

<script>
    let step = 0;
    const text = "HAPPY WEDDING ANNIVERSARY";
    const images = ["jpg (1).JPG", "jpg (2).JPG", "jpg (5).JPG", "jpg (6).JPG", "jpg (7).JPG", "jpg (8).JPG", "jpg (10).JPG"];

    function handleMagic() {
        step++;
        if (step === 1) { document.getElementById('inner-orbit').style.display = 'block'; } 
        else if (step === 2) { document.getElementById('outer-orbit').style.display = 'block'; }
        else if (step === 3) { rainAndFormText(); }
        else if (step === 4) { document.body.style.background = "#2a0010"; }
        else if (step === 5) {
            document.getElementById('left-banner').style.display = 'block';
            document.getElementById('right-banner').style.display = 'block';
        }
        else if (step === 6) {
            document.getElementById('couple-names').style.display = 'block';
            document.getElementById('special-msg').style.display = 'block';
        }
    }

    function rainAndFormText() {
        const container = document.getElementById('letters-container');
        text.split("").forEach((char, i) => {
            setTimeout(() => {
                if (char === " ") {
                    const space = document.createElement('div');
                    space.style.width = "20px";
                    container.appendChild(space);
                    return;
                }
                const piece = document.createElement('div');
                piece.className = 'letter-final';
                piece.style.backgroundImage = `url('jpg (1).JPG')`;
                piece.innerText = char;
                container.appendChild(piece);
            }, i * 150);
        });
    }

    function createMagicParticle(e) {
        let x = e.touches ? e.touches[0].clientX : e.clientX;
        let y = e.touches ? e.touches[0].clientY : e.clientY;
        const particle = document.createElement('div');
        particle.className = 'magic-particle';
        particle.innerHTML = '✨';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.color = 'gold';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 1000);
    }
</script>

</body>
</html>
