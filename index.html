<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary ❤️</title>
    <style>
        body {
            margin: 0; background: #000; color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            font-family: 'Arial', sans-serif; overflow: hidden;
        }
        /* మెరిసే నక్షత్రాలు */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #20002c, #000); }

        /* ఫోటో ఫ్రేమ్ */
        .container {
            position: relative; width: 300px; height: 450px;
            perspective: 1000px; cursor: pointer;
        }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s;
            box-shadow: 0 0 30px #ff0077; border-radius: 20px; border: 4px solid gold;
        }
        img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 16px; position: absolute;
            backface-visibility: hidden;
        }
        
        /* మెసేజ్ స్టైల్ */
        h1 { color: #ff0077; text-shadow: 0 0 15px #ff0077; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: gold; font-size: 0.9rem; margin-top: 15px; animation: blink 1.5s infinite; }
        
        @keyframes blink { 50% { opacity: 0.3; } }
        
        /* Floating Hearts యానిమేషన్ */
        .heart {
            position: absolute; color: red; font-size: 20px;
            animation: float 3s linear infinite; opacity: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body onclick="changePhoto()">
    <div class="stars"></div>
    <h1>Happy Anniversary ❤️</h1>
    
    <div class="container">
        <div class="card">
            <img id="currentPhoto" src="master.jpg.JPG">
        </div>
    </div>

    <p>స్క్రీన్ మీద క్లిక్ చేయండి! ✨</p>
    <h2 style="color: pink; margin-top: 10px;">Ramana ❤️ Janu</h2>

    <script>
        // మీ ఫోటోల లిస్ట్ ఇక్కడ ఉంది
        const photos = [
            "master.jpg.JPG", "jpg (1).JPG", "jpg (2).JPG", "jpg (3).JPG", 
            "jpg (5).JPG", "jpg (6).JPG", "jpg (7).JPG", "jpg (8).JPG", 
            "jpg (9).JPG", "jpg (10).JPG", "jpg (11).JPG"
        ];
        let index = 0;

        function changePhoto() {
            index = (index + 1) % photos.length;
            const img = document.getElementById('currentPhoto');
            
            // ఫోటో మారేటప్పుడు యానిమేషన్
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = photos[index];
                img.style.opacity = 1;
            }, 200);

            // హార్ట్ ఎఫెక్ట్స్ సృష్టించడం
            createHeart();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
