<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Anniversary - First Step</title>
    <style>
        body { 
            margin: 0; background: #000; display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }

        /* రెయిన్బో (Rainbow) బోర్డర్ కోసం ఒక అవుటర్ సర్కిల్ */
        .rainbow-circle {
            position: relative; width: 280px; height: 280px; 
            border-radius: 50%; overflow: hidden; 
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* బోర్డర్ చుట్టూ తిరిగే రంగులు (Rotating Colors) */
        .rainbow-circle::before {
            content: ""; position: absolute; width: 400px; height: 400px;
            top: -60px; left: -60px;
            background: conic-gradient(red, orange, yellow, green, blue, indigo, violet, red);
            animation: rotateBorder 3s linear infinite;
        }

        /* లోపల ఫోటో ఫ్రేమ్ */
        .photo-inner {
            position: absolute; width: 260px; height: 260px;
            top: 10px; left: 10px; border-radius: 50%;
            background: black; overflow: hidden;
        }

        /* ఫేస్ కట్ అవ్వకుండా మాస్టర్ ఇమేజ్ (master.jpg.JPG) */
        img { 
            width: 100%; height: 100%; object-fit: contain; 
            border-radius: 50%; 
        }

        /* బోర్డర్ రొటేషన్ యానిమేషన్ (Rotation Animation) */
        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="rainbow-circle">
        <div class="photo-inner">
            <img src="master.jpg.JPG" alt="Ramana & Janu">
        </div>
    </div>
</body>
</html>
