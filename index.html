<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary Ramana & Janu</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        /* Magical Background */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0033 0%, #000 100%);
            z-index: -1;
        }

        header {
            padding: 40px 20px;
            animation: fadeInDown 2s;
        }

        h1 { 
            font-size: 2.2em; 
            color: #ff0077; 
            text-shadow: 0 0 20px #ff0077; 
            margin-bottom: 5px;
        }

        .sub-text { color: gold; font-size: 1.2em; letter-spacing: 2px; }

        /* Photo Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .photo-frame {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease backwards;
            aspect-ratio: 3/4;
        }

        .photo-frame img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s;
        }

        .photo-frame:hover img { transform: scale(1.1); }

        /* Master Photo Special Style */
        .master-frame {
            grid-column: 1 / -1;
            max-width: 400px;
            margin: 20px auto;
            border: 3px solid gold;
            box-shadow: 0 0 30px gold;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { padding: 50px 20px; color: #ff0077; font-size: 1.5em; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <header>
        <h1>Happy Wedding Anniversary ❤️</h1>
        <div class="sub-text">Ramana & Janu</div>
    </header>

    <div class="gallery">
        <div class="photo-frame master-frame"><img src="master.jpg.JPG"></div>
        <div class="photo-frame" style="animation-delay: 0.2s"><img src="jpg (1).JPG"></div>
        <div class="photo-frame" style="animation-delay: 0.4s"><img src="jpg (2).JPG"></div>
        <div class="photo-frame" style="animation-delay: 0.6s"><img src="jpg (3).JPG"></div>
        <div class="photo-frame" style="animation-delay: 0.8s"><img src="jpg (5).JPG"></div>
        <div class="photo-frame" style="animation-delay: 1.0s"><img src="jpg (6).JPG"></div>
        <div class="photo-frame" style="animation-delay: 1.2s"><img src="jpg (7).JPG"></div>
        <div class="photo-frame" style="animation-delay: 1.4s"><img src="jpg (8).JPG"></div>
        <div class="photo-frame" style="animation-delay: 1.6s"><img src="jpg (9).JPG"></div>
        <div class="photo-frame" style="animation-delay: 1.8s"><img src="jpg (10).JPG"></div>
        <div class="photo-frame" style="animation-delay: 2.0s"><img src="jpg (11).JPG"></div>
    </div>

    <footer>Together Forever 💍</footer>
</body>
</html>
