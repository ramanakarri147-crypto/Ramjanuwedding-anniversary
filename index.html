<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary - Ramana & Janu</title>
    <style>
        body { 
            margin: 0; 
            background: #0a001a; 
            color: white; 
            text-align: center; 
            font-family: 'Arial Black', sans-serif; 
            overflow-x: hidden;
        }

        /* Background Effects */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,0,119,0.1) 0%, transparent 80%);
            z-index: -1;
        }

        h1 { 
            margin-top: 30px; 
            color: #ff0077; 
            text-shadow: 0 0 15px #ff0077;
            font-size: 1.8em; 
            padding: 10px;
        }

        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            padding: 15px; 
            gap: 15px; 
        }

        .photo-frame { 
            position: relative;
            width: 140px; /* ఫోన్ లో నీట్ గా ఉండటానికి */
            height: 200px;
            border: 3px solid gold; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transition: transform 0.4s, box-shadow 0.4s;
            animation: fadeIn 1.5s ease-in;
        }

        .photo-frame:hover { 
            transform: scale(1.1) rotate(2deg); 
            box-shadow: 0 0 25px gold;
            z-index: 10;
        }

        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Laptop/Desktop కోసం మార్పులు */
        @media (min-width: 600px) {
            h1 { font-size: 3em; }
            .photo-frame { width: 220px; height: 300px; }
        }

        .footer-text {
            margin: 40px 0;
            color: pink;
            font-size: 1.2em;
            letter-spacing: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #ff0077; }
            to { text-shadow: 0 0 20px #ff0077, 0 0 30px #ff0077; }
        }
    </style>
</head>
<body>

    <h1>Happy Wedding Anniversary! ❤️</h1>
    <p style="color: #00d4ff;">Ramana ❤️ Janu</p>

    <div class="gallery">
        <div class="photo-frame"><img src="jpg (1).JPG"></div>
        <div class="photo-frame"><img src="jpg (2).JPG"></div>
        <div class="photo-frame"><img src="jpg (3).JPG"></div>
        <div class="photo-frame"><img src="jpg (5).JPG"></div>
        <div class="photo-frame"><img src="jpg (6).JPG"></div>
        <div class="photo-frame"><img src="jpg (7).JPG"></div>
        <div class="photo-frame"><img src="jpg (8).JPG"></div>
        <div class="photo-frame"><img src="jpg (9).JPG"></div>
        <div class="photo-frame"><img src="jpg (10).JPG"></div>
        <div class="photo-frame"><img src="jpg (11).JPG"></div>
        <div class="photo-frame" style="width: 90%; max-width: 400px; height: auto; aspect-ratio: 16/9;">
            <img src="master.jpg.JPG">
        </div>
    </div>

    <div class="footer-text">Forever Together 💍</div>

</body>
</html>
